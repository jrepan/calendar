<html>
    <head>
        <title>Kalender</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    </head>
    <body>
        <section class="calendar-section">
            <div class="calendar-container">
                <div class="calendar-header">
                    <div>
                        <button id="prevMonth" aria-label="Previous month">&lt;</button>
                        <button id="nextMonth" aria-label="Next month">&gt;</button>
                    </div>
                    <h2 id="monthYear">Month Year</h2>
                    <div class="header-actions">
                        <button id="exportIcs" title="Export as .ics">Export</button>
                        <form id="importForm" style="display:inline-block" enctype="multipart/form-data">
                            <input id="importFile" name="file" type="file" accept=".ics" style="display:none">
                            <button id="importBtn" type="button">Import</button>
                        </form>
                    </div>
                </div>
                <div id="calendar" class="calendar-grid" aria-live="polite"></div>
            </div>
        </section>
		<script>window.SERVEREVENTS = {{ events|tojson | safe }} || [];</script>
        <script src="{{ url_for('static', filename='calendar.js') }}"></script>
    </body>
</html>
