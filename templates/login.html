<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
  <style>
    .login-box { max-width: 360px; margin: 8vh auto; padding: 24px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .login-box h1{ margin-top:0 }
    .login-box label{ display:block; margin:8px 0; }
    .login-box input{ width:100%; padding:8px; box-sizing:border-box }
    .login-btn{ margin-top:12px; padding:8px 12px; background:#0b63d4; color:#fff; border:0; border-radius:4px }
    .error{ color:#b00 }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Sign In</h1>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label>Password<input name="password" type="password" required autofocus></label>
      <button class="login-btn">Sign in</button>
    </form>
  </div>
</body>
</html>
